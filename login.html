<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICPS — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Root Variables ─────────────────────────────────────────── */
:root {
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 12px;
  --radius-lg: 18px;
  --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);

  /* Light Mode (White + Blue + Red) */
  --bg: #f0ebeb;
  --bg-alt: #F8FAFC;
  --surface: #FFFFFF;
  --surface-hover: #F1F5F9;
  --text: #0F172A;
  --text-muted: #64748B;
  --text-faint: #94A3B8;
  --border: #E2E8F0;
  --border-focus: #3B82F6;

  --primary: #2563EB;
  --primary-glow: rgba(37,99,235,0.25);
  --primary-soft: rgba(37,99,235,0.08);
  --primary-hover: #1D4ED8;

  --accent: #c6bbbb;
  --accent-soft: rgba(220,38,38,0.08);
  --accent-glow: rgba(220,38,38,0.15);

  --danger: #DC2626;
  --danger-soft: rgba(220,38,38,0.08);
  --danger-text: #B91C1C;

  --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.02);
  --shadow-card-hover: 0 10px 15px -3px rgba(0,0,0,0.06), 0 20px 25px -5px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
  --shadow-input: 0 0 0 3px rgba(37,99,235,0.15);
  --shadow-glow: 0 0 40px rgba(37,99,235,0.08);

  --glow-primary: rgba(37,99,235,0.12);
  --glow-accent: rgba(220,38,38,0.06);
}

/* Dark Mode (Navy + Blue + Gold) */
[data-theme="dark"] {
  --bg: #131316;
  --bg-alt: #0F172A;
  --surface: #131C31;
  --surface-hover: #1A2744;
  --text: #F8FAFC;
  --text-muted: #94A3B8;
  --text-faint: #64748B;
  --border: rgba(163, 184, 148, 0.28);
  --border-focus: #001caa;

  --primary: #3B82F6;
  --primary-glow: rgba(59,130,246,0.35);
  --primary-soft: rgba(59,130,246,0.12);
  --primary-hover: #60A5FA;

  --accent: #F59E0B;
  --accent-soft: rgba(245,158,11,0.12);
  --accent-glow: rgba(245,158,11,0.15);

  --danger: #EF4444;
  --danger-soft: rgba(239,68,68,0.12);
  --danger-text: #FCA5A5;

  --shadow-card: 0 24px 64px rgba(0,0,0,0.45), 0 0 0 1px rgba(59,130,246,0.08);
  --shadow-card-hover: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.12);
  --shadow-input: 0 0 0 3px rgba(59,130,246,0.18);
  --shadow-glow: 0 0 60px rgba(59,130,246,0.15);

  --glow-primary: rgba(59,130,246,0.18);
  --glow-accent: rgba(245,158,11,0.08);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; -webkit-font-smoothing:antialiased; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: background 0.4s ease, color 0.4s ease;
}

/* ── Background ─────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: transparent;
  pointer-events: none;
  z-index: 0;
  transition: background 0.4s ease;
}

/* ── Background Image (blur yet sharp) ─────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('icps-bg.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(8px) saturate(0.7);
  transform: scale(1.05); /* prevent blur edge bleed */
  opacity: 0.15;
  pointer-events: none;
  z-index: -1;
  transition: opacity 0.4s ease;
}
[data-theme="dark"] body::after {
  opacity: 0.08;
  filter: blur(8px) saturate(0.5) brightness(1.2);
}

.glow-tl {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--glow-primary) 0%, transparent 70%);
  top: -120px; left: -120px;
  pointer-events: none;
  z-index: 0;
  transition: background 0.4s ease;
}

.glow-br {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--glow-accent) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none;
  z-index: 0;
  transition: background 0.4s ease;
}

/* ── Theme Toggle ───────────────────────────────────────────── */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  box-shadow: var(--shadow-card);
  transition: var(--transition);
}
.theme-toggle:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-card-hover);
}
.theme-toggle button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 50px;
  color: var(--text-muted);
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.theme-toggle button.active {
  background: var(--primary-soft);
  color: var(--primary);
}
.theme-toggle button:hover:not(.active) {
  color: var(--text);
}
.theme-toggle svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  position: relative;
  z-index: 1;
  width: 440px;
  max-width: calc(100vw - 2rem);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 2.5rem;
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}
.card:hover {
  box-shadow: var(--shadow-card-hover);
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(24px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Logo ───────────────────────────────────────────────────── */
.logo-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2rem;
}
.logo-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px var(--primary-glow);
  flex-shrink: 0;
  transition: box-shadow 0.4s ease;
}
.logo-icon svg { width:22px; height:22px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.logo-title {
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
  transition: color 0.4s ease;
}
.logo-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
  font-family: var(--mono);
  letter-spacing: 0.03em;
  transition: color 0.4s ease;
}

/* ── Divider ────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 1.75rem;
  transition: background 0.4s ease;
}

/* ── Heading ────────────────────────────────────────────────── */
.signin-heading {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 0.4rem;
  color: var(--text);
  transition: color 0.4s ease;
}
.signin-sub {
  font-size: 0.875rem;
  color: var(--text-muted);
  margin-bottom: 1.75rem;
  font-weight: 400;
  transition: color 0.4s ease;
}

/* ── Role Selector ──────────────────────────────────────────── */
.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.role-card {
  position: relative;
  cursor: pointer;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 14px 14px 12px;
  transition: var(--transition);
  background: var(--bg-alt);
  user-select: none;
}
.role-card:hover { 
  border-color: var(--primary); 
  background: var(--primary-soft); 
}
.role-card.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.role-card input[type=radio] { position:absolute; opacity:0; width:0; height:0; }
.role-icon {
  width: 32px; height: 32px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  transition: var(--transition);
}
.role-icon svg { width:16px; height:16px; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.role-card:not(.selected) .role-icon { background: var(--border); }
.role-card:not(.selected) .role-icon svg { stroke: var(--text-muted); }
.role-card.selected .role-icon { 
  background: var(--primary); 
  box-shadow: 0 2px 8px var(--primary-glow); 
}
.role-card.selected .role-icon svg { stroke: #fff; }
.role-name { 
  font-size: 0.8125rem; 
  font-weight: 700; 
  color: var(--text); 
  margin-bottom: 2px; 
  letter-spacing: -0.01em; 
  transition: color 0.4s ease;
}
.role-desc { 
  font-size: 0.6875rem; 
  color: var(--text-muted); 
  line-height: 1.4; 
  transition: color 0.4s ease;
}
.role-check {
  position: absolute; top: 10px; right: 10px;
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.role-card.selected .role-check {
  background: var(--primary);
  border-color: var(--primary);
}
.role-check::after {
  content: '';
  width: 5px; height: 8px;
  border-right: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(45deg) translateY(-1px);
  opacity: 0;
  transition: opacity 0.15s;
}
.role-card.selected .role-check::after { opacity: 1; }

/* ── Fields ─────────────────────────────────────────────────── */
.field { margin-bottom: 1.1rem; }
.field label {
  display: block;
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
  transition: color 0.4s ease;
}
.input-wrap { position: relative; }
.input-wrap .field-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  stroke: var(--text-faint);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
  transition: var(--transition);
}
.field input {
  width: 100%;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9375rem;
  font-weight: 400;
  padding: 11px 12px 11px 40px;
  outline: none;
  transition: var(--transition);
  -webkit-appearance: none;
}
.field input::placeholder { color: var(--text-faint); }
.field input:focus {
  border-color: var(--border-focus);
  background: var(--surface);
  box-shadow: var(--shadow-input);
}
.field input:focus + .field-icon,
.input-wrap:focus-within .field-icon {
  stroke: var(--primary);
}

/* Password toggle */
.input-wrap .pw-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-faint);
  display: flex; align-items: center;
  padding: 0; transition: var(--transition);
}
.input-wrap .pw-toggle:hover { color: var(--text-muted); }

/* ── Error ──────────────────────────────────────────────────── */
.error-msg {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--danger-soft);
  border: 1px solid rgba(220,38,38,0.2);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 0.8125rem;
  color: var(--danger-text);
  margin-bottom: 1rem;
  animation: shake 0.4s cubic-bezier(.36,.07,.19,.97);
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
}
.error-msg.show { display: flex; }
.error-msg svg { 
  width:14px; height:14px; fill:none; stroke:var(--danger); stroke-width:2; flex-shrink:0; 
}
@keyframes shake { 
  10%,90%{transform:translateX(-2px)} 
  20%,80%{transform:translateX(4px)} 
  30%,50%,70%{transform:translateX(-5px)} 
  40%,60%{transform:translateX(5px)} 
}

/* ── Submit Button ──────────────────────────────────────────── */
.btn-signin {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.9375rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.01em;
  box-shadow: 0 4px 16px var(--primary-glow);
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  position: relative;
  overflow: hidden;
}
.btn-signin::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn-signin:hover::before { background: rgba(255,255,255,0.1); }
.btn-signin:hover { 
  transform: translateY(-1px); 
  box-shadow: 0 8px 24px var(--primary-glow); 
}
.btn-signin:active { transform: translateY(0); }
.btn-signin svg { 
  width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; 
}

/* ── Footer ─────────────────────────────────────────────────── */
.card-footer {
  margin-top: 1.5rem;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-faint);
  font-family: var(--mono);
  letter-spacing: 0.02em;
  transition: color 0.4s ease;
}
.card-footer span { color: var(--text-muted); }

/* ── Loading Spinner ────────────────────────────────────────── */
@keyframes spin { to { transform:rotate(360deg); } }
.spinner {
  width:16px; height:16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}
.btn-signin.loading .spinner { display: block; }
.btn-signin.loading .btn-label { display: none; }

/* ── Accent Red Strip (Light Mode Only) ─────────────────────── */
.accent-strip {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--primary) 50%, var(--accent) 100%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  opacity: 0.8;
  transition: opacity 0.4s ease;
}
[data-theme="dark"] .accent-strip {
  opacity: 0;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 480px) {
  .card { padding: 1.75rem; }
  .role-grid { gap: 8px; }
  .theme-toggle { top: 12px; right: 12px; }
}
</style>

<div class="glow-tl"></div>

<!-- Theme Toggle -->
<div class="theme-toggle" id="themeToggle" role="tablist" aria-label="Theme selector">

<script>
// ── Theme Management ───────────────────────────────────────────
const THEME_KEY = 'icps_theme';

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);

  // Update toggle buttons
  document.querySelectorAll('.theme-toggle button').forEach(btn => {
    if (btn.dataset.theme === theme) {
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
    } else {
      btn.classList.remove('active');
      btn.setAttribute('aria-selected', 'false');
    }
  });
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  setTheme(theme);
}

// Toggle click handlers
document.querySelectorAll('.theme-toggle button').forEach(btn => {
  btn.addEventListener('click', () => setTheme(btn.dataset.theme));
});

// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem(THEME_KEY)) {
    setTheme(e.matches ? 'dark' : 'light');
  }
});

initTheme();

// ── Credentials ──────────────────────────────────────────────────
const USERS = {
  admin:    { password: 'icps2024',    role: 'admin',    name: 'Administrator' },
  security: { password: 'security2024', role: 'security', name: 'Security Personnel' },
  'papa.baah': { password: 'Lannuari243', role: 'admin', name: 'Papa Baah' },
  'kwakukwakwa': { password: 'kwaku2024', role: 'admin', name: 'Kwaku Kwakwa' }
};

const SESSION_KEY = 'icps_user_session';

// ── Role card toggle ─────────────────────────────────────────────
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    card.querySelector('input[type=radio]').checked = true;
    const role = card.querySelector('input').value;
    const usernameInput = document.getElementById('username');
    if (!usernameInput.value) usernameInput.value = role;
    clearError();
  });
});

// ── Password toggle ──────────────────────────────────────────────
document.getElementById('pwToggle').addEventListener('click', () => {
  const input = document.getElementById('password');
  const eye = document.getElementById('pwEye');
  if (input.type === 'password') {
    input.type = 'text';
    eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// ── Error helpers ────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// ── Sign-in logic ────────────────────────────────────────────────
async function handleSignIn() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const selectedRole = document.querySelector('input[name=role]:checked').value;
  clearError();

  if (!username || !password) {
    showError('Please enter both username and password.');
    return;
  }

  const btn = document.getElementById('signinBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  await new Promise(r => setTimeout(r, 600));

  const user = USERS[username];
  if (!user || user.password !== password) {
    btn.classList.remove('loading');
    btn.disabled = false;
    showError('Invalid username or password. Please try again.');
    document.getElementById('password').value = '';
    return;
  }

  if (user.role !== selectedRole) {
    btn.classList.remove('loading');
    btn.disabled = false;
    showError(`This account does not have the "${selectedRole === 'admin' ? 'Administrator' : 'Security Personnel'}" role.`);
    return;
  }

  try {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      username,
      role: user.role,
      name: user.name,
      loginTime: Date.now(),
      expiry: Date.now() + 8 * 60 * 60 * 1000
    }));
  } catch(e) {}

  window.location.href = 'index.html';
}

document.getElementById('signinBtn').addEventListener('click', handleSignIn);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

// ── Auto-redirect if logged in ───────────────────────────────────
try {
  const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
  if (s && s.expiry > Date.now()) {
    window.location.href = 'index.html';
  }
} catch(e) {}

// Pre-fill admin
document.getElementById('username').value = 'admin';
</script>
